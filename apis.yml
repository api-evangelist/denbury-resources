description: >-
  Denbury Resources (now Denbury Inc.) was an independent oil and natural
  gas company focused on enhanced oil recovery (EOR) using carbon dioxide
  injection in mature oil fields. Denbury was acquired by ExxonMobil in
  November 2023 and operates as a subsidiary inside ExxonMobil's Low
  Carbon Solutions business. Denbury does not publish public APIs; this
  profile is preserved as a corporate-history index.
